<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Portfólio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5e1;
      margin-bottom: 20px;
    }

    a {
      display: inline-block;
      padding: 10px 20px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.2s;
    }

    a:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Meu Portfólio </h1>
    <p>Site publicado no GitHub Pages com sucesso.</p>

    <a href="https://github.com/marcospaulo29almeida/Bootcamp--entrega-final-.git">Ver GitHub</a>
  </div>
</body>
</html>
